name: Draw Keymap

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Parse keymap to YAML
        run: |
          keymap parse -z config/corne_choc_pro.keymap > keymap.yaml
          # Point the parsed YAML at the repo's QMK-style layout JSON,
          # since "corne_choc_pro" is not in keymap-drawer's built-in keyboard list.
          sed -i 's|^layout: .*|layout: {qmk_info_json: config/corne_choc_pro.json, layout_name: default_layout}|' keymap.yaml

      - name: Draw SVG
        run: keymap draw keymap.yaml > keymap.svg

      - name: Commit regenerated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain keymap.yaml keymap.svg)" ]]; then
            git add keymap.yaml keymap.svg
            git commit -m "chore: regenerate keymap visualization [skip ci]"
            git push
          else
            echo "Keymap visualization unchanged — nothing to commit."
          fi
